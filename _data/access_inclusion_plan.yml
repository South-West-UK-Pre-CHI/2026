- section_id: "accessible-presentations"
  section_title: "Accessible Presentations"
  section_content: "Hearing loops will be in place for the duration of the conference. Sighted guides will be available for those who requested them on the registration form. Copies of the slides with alt-text are available on the OneDrive so that anyone can have a closer look or use a screen reader to view the slides. We politely ask attendees not to share any of the content of the OneDrive, or download the slides if not necessary as they are not for public distribution. Live Captioning will be provided at every Talk Session."

- section_id: "shared-onedrive"
  section_title: "Shared OneDrive"
  section_content: "We have provided access to the slides for screen reader access. 
  Please do not share any of the slides as they are not public access. 
  For access to all the slides, the online version of the access and inclusion plan and the program, please follow the link:
 [click here](https://uob-my.sharepoint.com/my?id=%2Fpersonal%2Fsy19551%5Fbristol%5Fac%5Fuk%2FDocuments%2FPre%2DCHI%202026%20Presentation%20Slides&ct=1774455983310&or=OWA%2DNT%2DMail&ga=1&%3D%3D&sdata=Qm51cEVURzVWY1ZMeUo2d0s1UXY2MmIzN04vaERuN3F5eVYzNHNRb2xtYz0%3D&ovuser=b2e47f30%2Dcd7d%2D4a4e%2Da5da%2Db18cf1a4151b%2Cvl25527%40bristol%2Eac%2Euk)."

- section_id: "what-to-bring"
  section_title: "What should you bring?"
  section_content: "Yourself, a smartphone or laptop, a lanyard and last year's wooden name badge if you still have 
  it and the information is accurate."

- section_id: "questions"
  section_title: "Further Queries/Questions"
  section_content: "If you have any questions you can email the organisers at [swukprechi@gmail.com](swukprechi@gmail.com), or at the event,
  find one of them wearing TBC and a pink name badge."
